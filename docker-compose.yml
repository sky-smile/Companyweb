# =============================================
# CompanyWeb Docker Compose - 生产部署配置
# =============================================

services:
  # ── 数据库 ──────────────────────────
  mariadb:
    image: mariadb:11.4
    container_name: companyweb-mariadb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE:-company_web}
      MARIADB_USER: ${DB_USER:-companyweb}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - companyweb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── 后端 API ────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: companyweb-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./server/.env
    volumes:
      - server_uploads:/app/uploads
    networks:
      - companyweb
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── 管理后台 ──────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: companyweb-admin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./admin/.env
    networks:
      - companyweb
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ── 官网前端 ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_SITE_URL: ${APP_URL:-http://localhost}
    container_name: companyweb-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./frontend/.env
    networks:
      - companyweb
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Nginx 反向代理 ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: companyweb-nginx
    restart: unless-stopped
    ports:
      - "8089:8089"
      - "80:80"
      - "443:443"
      - "8443:443"
    volumes:
      - ./docker/nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - companyweb
    depends_on:
      - server
      - admin
      - frontend
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# ── 网络 ───────────────────────────────────
networks:
  companyweb:
    driver: bridge

# ── 卷 ────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  server_uploads:
    driver: local
  nginx_logs:
    driver: local
